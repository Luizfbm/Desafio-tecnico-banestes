<script>
  // ─────────────────────────────────────────────────────
  // ESTADO GLOBAL
  // ─────────────────────────────────────────────────────
  var _processos = [];
  var _clientes = [];
  var _produtos = [];
  var _unidades = [];
  var _deleteId = null;

  var STATUS_BADGE = {
    'INICIADO': 'badge-iniciado',
    'ANALISANDO': 'badge-analisando',
    'PENDENTE': 'badge-pendente',
    'PARALISADO': 'badge-paralisado',
    'FINALIZADO': 'badge-finalizado'
  };

  // ─────────────────────────────────────────────────────
  // UTILITÁRIOS
  // ─────────────────────────────────────────────────────
  function showToast(msg, tipo) {
    var t = document.getElementById('toast');
    var tc = document.getElementById('toastContent');
    tc.textContent = msg;
    tc.className = 'px-5 py-3 rounded-xl shadow-lg text-white text-sm font-medium min-w-[200px] ' +
      (tipo === 'erro' ? 'bg-red-600' : 'bg-green-600');
    t.classList.remove('hidden');
    setTimeout(function () { t.classList.add('hidden'); }, 3500);
  }

  function parseValor(str) {
    if (!str) return 0;
    return parseFloat(String(str).replace(/[R$\s.]/g, '').replace(',', '.')) || 0;
  }

  function formatValor(num) {
    return 'R$ ' + num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function setBtnLoading(btnId, loading, textoOriginal) {
    var btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Aguarde...' : textoOriginal;
  }

  // ─────────────────────────────────────────────────────
  // INICIALIZAÇÃO
  // ─────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    carregarTudo();
    bindEventos();
  });

  function carregarTudo() {
    google.script.run
      .withSuccessHandler(function (data) {
        _processos = data;
        renderTabela(_processos);
        renderStats(_processos);
      })
      .withFailureHandler(function (err) {
        showToast('Erro ao carregar processos: ' + err.message, 'erro');
      })
      .getProcessos();

    google.script.run
      .withSuccessHandler(function (data) {
        _clientes = data;
        popularSelect('campoCliente', data, 'ID', 'NOME');
      })
      .getClientes();

    google.script.run
      .withSuccessHandler(function (data) {
        _unidades = data;
        popularSelect('campoUnidade', data, 'ID', 'NOME');
      })
      .getUnidades();

    google.script.run
      .withSuccessHandler(function (data) {
        _produtos = data;
        popularSelect('campoProduto', data, 'ID', 'NOME');
      })
      .getProdutos();
  }

  function popularSelect(selectId, dados, valorKey, textoKey) {
    var sel = document.getElementById(selectId);
    dados.forEach(function (item) {
      var opt = document.createElement('option');
      opt.value = item[valorKey];
      opt.textContent = item[valorKey] + ' — ' + item[textoKey];
      sel.appendChild(opt);
    });
  }

  // ─────────────────────────────────────────────────────
  // RENDER TABELA
  // ─────────────────────────────────────────────────────
  function renderTabela(lista) {
    var loading = document.getElementById('loadingIndicator');
    var wrapper = document.getElementById('tabelaWrapper');
    var semRes = document.getElementById('semResultados');
    var tbody = document.getElementById('tabelaBody');
    var counter = document.getElementById('contadorProcessos');

    loading.classList.add('hidden');

    if (!lista || lista.length === 0) {
      wrapper.classList.add('hidden');
      semRes.classList.remove('hidden');
      counter.textContent = '(0)';
      return;
    }

    semRes.classList.add('hidden');
    wrapper.classList.remove('hidden');
    counter.textContent = '(' + lista.length + ')';

    tbody.innerHTML = lista.map(function (p) {
      var valor = parseValor(p.valor);
      var baixo = valor > 0 && valor < 15000;
      var rowCls = baixo ? 'row-baixo-valor' : '';
      var badge = STATUS_BADGE[p.andamento] || 'badge-iniciado';
      var valorFmt = valor > 0 ? formatValor(valor) : (p.valor || '—');
      var valorCls = baixo ? 'text-orange-600 font-semibold' : 'text-gray-800 font-medium';
      var data = String(p.dataAtualizacao || '').split(',')[0] || '—';

      return [
        '<tr class="' + rowCls + '">',
        '<td class="px-4 py-3 font-mono text-xs text-gray-400">' + p.id + '</td>',
        '<td class="px-4 py-3">',
        '<div class="font-medium text-gray-800 cell-truncate" title="' + p.clienteNome + '">' + p.clienteNome + '</div>',
        '<div class="text-xs text-gray-400">' + p.clienteDoc + '</div>',
        '</td>',
        '<td class="px-4 py-3 text-gray-600 cell-truncate" title="' + p.produtoNome + '">' + p.produtoNome + '</td>',
        '<td class="px-4 py-3 text-gray-600 text-xs">' + p.unidadeNome + '</td>',
        '<td class="px-4 py-3 ' + valorCls + '">' + valorFmt + '</td>',
        '<td class="px-4 py-3 text-gray-500 text-xs">' + (p.garantia || '—') + '</td>',
        '<td class="px-4 py-3"><span class="badge ' + badge + '">' + p.andamento + '</span></td>',
        '<td class="px-4 py-3 text-xs text-gray-400">' + data + '</td>',
        '<td class="px-4 py-3">',
        '<div class="flex items-center justify-center gap-2">',
        '<button onclick="abrirEdicao(\'' + p.id + '\')" ',
        'class="text-[#003f7f] hover:underline text-xs font-semibold">Editar</button>',
        '<span class="text-gray-300">|</span>',
        '<button onclick="confirmarDelete(\'' + p.id + '\')" ',
        'class="text-red-500 hover:underline text-xs font-semibold">Excluir</button>',
        '</div>',
        '</td>',
        '</tr>'
      ].join('');
    }).join('');
  }

  // ─────────────────────────────────────────────────────
  // RENDER STATS CARDS
  // ─────────────────────────────────────────────────────
  function renderStats(lista) {
    var total = lista.length;
    var totalValor = lista.reduce(function (s, p) { return s + parseValor(p.valor); }, 0);
    var comGarant = lista.filter(function (p) { return p.garantia && p.garantia !== 'NENHUMA'; }).length;
    var viaveis = lista.filter(function (p) { return parseValor(p.valor) >= 15000; }).length;

    var cards = [
      { label: 'Total de Processos', value: total, icon: '📋' },
      { label: 'Valor Total', value: formatValor(totalValor), icon: '💰' },
      { label: 'Com Garantia', value: comGarant, icon: '🔒' },
      { label: 'Viáveis (≥ R$15k)', value: viaveis, icon: '✅' }
    ];

    document.getElementById('statsCards').innerHTML = cards.map(function (c) {
      return [
        '<div class="bg-white rounded-xl shadow-sm p-4 flex items-center gap-3">',
        '<div class="text-3xl">' + c.icon + '</div>',
        '<div>',
        '<div class="text-xl font-bold text-gray-800">' + c.value + '</div>',
        '<div class="text-xs text-gray-500 mt-0.5">' + c.label + '</div>',
        '</div>',
        '</div>'
      ].join('');
    }).join('');
  }

  // ─────────────────────────────────────────────────────
  // FILTROS
  // ─────────────────────────────────────────────────────
  function aplicarFiltros() {
    var texto = document.getElementById('filtroTexto').value.toLowerCase().trim();
    var status = document.getElementById('filtroStatus').value;
    var garantia = document.getElementById('filtroGarantia').value;

    var filtrado = _processos.filter(function (p) {
      var matchTexto = !texto ||
        (p.clienteNome || '').toLowerCase().includes(texto) ||
        String(p.contrato || '').includes(texto) ||
        (p.id || '').toLowerCase().includes(texto);
      var matchStatus = !status || p.andamento === status;
      var matchGar = !garantia || p.garantia === garantia;
      return matchTexto && matchStatus && matchGar;
    });

    renderTabela(filtrado);
  }

  function limparFiltros() {
    document.getElementById('filtroTexto').value = '';
    document.getElementById('filtroStatus').value = '';
    document.getElementById('filtroGarantia').value = '';
    renderTabela(_processos);
  }

  // ─────────────────────────────────────────────────────
  // MODAL FORMULÁRIO
  // ─────────────────────────────────────────────────────
  function abrirNovoProcesso() {
    document.getElementById('modalTitulo').textContent = 'Novo Processo';
    document.getElementById('formProcesso').reset();
    document.getElementById('campoId').value = '';
    document.getElementById('viabilidadeBanner').classList.add('hidden');
    document.getElementById('modalOverlay').classList.remove('hidden');
  }

  function abrirEdicao(id) {
    var p = _processos.find(function (x) { return x.id === id; });
    if (!p) return;

    document.getElementById('modalTitulo').textContent = 'Editar — ' + id;
    document.getElementById('campoId').value = p.id;
    document.getElementById('campoCliente').value = p.clienteId;
    document.getElementById('campoUnidade').value = p.unidadeId;
    document.getElementById('campoProduto').value = p.produtoId;
    document.getElementById('campoContrato').value = p.contrato;
    document.getElementById('campoValor').value = p.valor;
    document.getElementById('campoGarantia').value = p.garantia;
    document.getElementById('campoAndamento').value = p.andamento;
    verificarViabilidade();
    document.getElementById('modalOverlay').classList.remove('hidden');
  }

  function fecharModal() {
    document.getElementById('modalOverlay').classList.add('hidden');
  }

  function verificarViabilidade() {
    var valor = parseValor(document.getElementById('campoValor').value);
    var garantia = document.getElementById('campoGarantia').value;
    var banner = document.getElementById('viabilidadeBanner');

    if (valor <= 0) { banner.classList.add('hidden'); return; }

    if (valor < 15000 && garantia === 'NENHUMA') {
      banner.className = 'rounded-lg px-4 py-3 text-sm font-medium bg-red-50 text-red-700 border border-red-200';
      banner.textContent = '⚠️ Baixa viabilidade: valor abaixo de R$ 15.000 e sem garantia real.';
    } else if (valor < 15000) {
      banner.className = 'rounded-lg px-4 py-3 text-sm font-medium bg-yellow-50 text-yellow-700 border border-yellow-200';
      banner.textContent = '⚡ Valor abaixo de R$ 15.000, mas há garantia real. Avalie a viabilidade.';
    } else {
      banner.className = 'rounded-lg px-4 py-3 text-sm font-medium bg-green-50 text-green-700 border border-green-200';
      banner.textContent = '✅ Processo com boa viabilidade para ajuizamento.';
    }
    banner.classList.remove('hidden');
  }

  function salvarProcesso(e) {
    e.preventDefault();
    setBtnLoading('btnSalvar', true, 'Salvar');

    var id = document.getElementById('campoId').value;
    var data = {
      id: id,
      clienteId: document.getElementById('campoCliente').value,
      unidadeId: document.getElementById('campoUnidade').value,
      produtoId: document.getElementById('campoProduto').value,
      contrato: document.getElementById('campoContrato').value,
      valor: document.getElementById('campoValor').value,
      garantia: document.getElementById('campoGarantia').value,
      andamento: document.getElementById('campoAndamento').value
    };

    var fn = id ? 'updateProcesso' : 'createProcesso';

    google.script.run
      .withSuccessHandler(function () {
        fecharModal();
        showToast(id ? '✅ Processo atualizado!' : '✅ Processo criado!', 'ok');
        setBtnLoading('btnSalvar', false, 'Salvar');
        recarregarProcessos();
      })
      .withFailureHandler(function (err) {
        showToast('Erro: ' + err.message, 'erro');
        setBtnLoading('btnSalvar', false, 'Salvar');
      })
    [fn](data);
  }

  // ─────────────────────────────────────────────────────
  // DELETE
  // ─────────────────────────────────────────────────────
  function confirmarDelete(id) {
    _deleteId = id;
    document.getElementById('modalDelete').classList.remove('hidden');
  }

  function executarDelete() {
    if (!_deleteId) return;
    setBtnLoading('btnConfirmarDelete', true, 'Excluir');

    google.script.run
      .withSuccessHandler(function () {
        document.getElementById('modalDelete').classList.add('hidden');
        showToast('🗑️ Processo excluído!', 'ok');
        setBtnLoading('btnConfirmarDelete', false, 'Excluir');
        _deleteId = null;
        recarregarProcessos();
      })
      .withFailureHandler(function (err) {
        showToast('Erro ao excluir: ' + err.message, 'erro');
        setBtnLoading('btnConfirmarDelete', false, 'Excluir');
      })
      .deleteProcesso(_deleteId);
  }

  // ─────────────────────────────────────────────────────
  // UTILITÁRIO — recarrega lista após mutação
  // ─────────────────────────────────────────────────────
  function recarregarProcessos() {
    google.script.run
      .withSuccessHandler(function (data) {
        _processos = data;
        renderTabela(data);
        renderStats(data);
      })
      .getProcessos();
  }

  // ─────────────────────────────────────────────────────
  // BIND DE EVENTOS
  // ─────────────────────────────────────────────────────
  function bindEventos() {
    document.getElementById('btnNovoProcesso').addEventListener('click', abrirNovoProcesso);
    document.getElementById('btnFecharModal').addEventListener('click', fecharModal);
    document.getElementById('btnCancelarForm').addEventListener('click', fecharModal);
    document.getElementById('formProcesso').addEventListener('submit', salvarProcesso);
    document.getElementById('campoValor').addEventListener('input', verificarViabilidade);
    document.getElementById('campoGarantia').addEventListener('change', verificarViabilidade);
    document.getElementById('btnFiltrar').addEventListener('click', aplicarFiltros);
    document.getElementById('btnLimpar').addEventListener('click', limparFiltros);
    document.getElementById('btnConfirmarDelete').addEventListener('click', executarDelete);
    document.getElementById('btnCancelarDelete').addEventListener('click', function () {
      document.getElementById('modalDelete').classList.add('hidden');
      _deleteId = null;
    });
    // Fechar modal clicando fora
    document.getElementById('modalOverlay').addEventListener('click', function (e) {
      if (e.target === this) fecharModal();
    });
  }
</script>
